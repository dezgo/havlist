{% extends "base.html" %}
{% block title %}Sign Up — HavList{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Sign Up</h1>
    <form method="post" action="/register" class="auth-form">
        <label class="field">
            <span>Name</span>
            <input type="text" name="name" class="input" autocomplete="name">
        </label>
        <label class="field">
            <span>Email</span>
            <input type="email" name="email" class="input" required autocomplete="email">
        </label>
        <label class="field">
            <span>Password</span>
            <input type="password" name="password" class="input" required minlength="6" autocomplete="new-password">
        </label>
        <button type="submit" class="btn btn-primary btn-large">Create Account</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="/login">Log in</a></p>
</div>
{% endblock %}
